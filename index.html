<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>KaïKaï — Tahitian Food · Genève</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #060a07;
      --green-deep: #1a2e1e;
      --green-mid: #2d4a32;
      --green-bright: #7ab86a;
      --white: #f2f0eb;
      --white-dim: rgba(242,240,235,0.5);
      --white-faint: rgba(242,240,235,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: -webkit-fill-available; }
    body {
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: none;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
    }
    .atmo { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .atmo-bl { position: absolute; bottom: -80px; left: -100px; width: 500px; height: 500px; background: radial-gradient(ellipse, rgba(45,74,50,0.55) 0%, transparent 70%); filter: blur(60px); }
    .atmo-tr { position: absolute; top: -60px; right: -80px; width: 400px; height: 400px; background: radial-gradient(ellipse, rgba(26,46,30,0.45) 0%, transparent 70%); filter: blur(50px); }
    .leaf { position: fixed; pointer-events: none; z-index: 0; }
    .leaf-bl { bottom: -20px; left: -40px; width: min(55vw, 280px); opacity: 0.22; transform-origin: 60% 90%; animation: leafSwayBL 8s ease-in-out infinite; }
    .leaf-tr { top: -10px; right: -30px; width: min(45vw, 230px); opacity: 0.14; transform-origin: 40% 10%; animation: leafSwayTR 10s ease-in-out infinite; }
    .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 50px 22px 20px; }
    .header { text-align: center; margin-bottom: 44px; animation: fadeDown 0.7s ease both; }
    .logo-img {
      width: clamp(240px, 70vw, 400px);
      display: block; margin: 0 auto;
      /* MODIF 1 : fond noir invisible via screen blend */
      filter: brightness(1.05) drop-shadow(0 0 22px rgba(255,255,255,0.2));
    }
    .logo-sub { margin-top: 12px; font-size: clamp(10px, 2.8vw, 12px); letter-spacing: 0.38em; text-transform: uppercase; color: var(--green-bright); font-weight: 400; }
    .logo-by { margin-top: 3px; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--white-dim); font-weight: 300; }
    .cards { display: flex; flex-direction: column; gap: 11px; width: 100%; max-width: 400px; }
    .card { display: flex; align-items: center; gap: 16px; padding: 20px 20px; border: 1px solid rgba(255,255,255,0.09); border-radius: 6px; background: rgba(255,255,255,0.035); text-decoration: none; color: inherit; transition: border-color 0.22s ease, background 0.22s ease, transform 0.18s ease; position: relative; overflow: hidden; }
    .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(130deg, rgba(122,184,106,0.07) 0%, transparent 55%); opacity: 0; transition: opacity 0.22s ease; }
    .card:hover::after { opacity: 1; }
    .card:hover { border-color: rgba(122,184,106,0.38); background: rgba(255,255,255,0.06); transform: translateY(-2px); }
    .card:active { transform: scale(0.98); }
    .card-primary { border-color: rgba(122,184,106,0.3); background: rgba(122,184,106,0.07); padding: 22px 20px; }
    .card-primary:hover { border-color: rgba(122,184,106,0.65); background: rgba(122,184,106,0.13); }
    .icon { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-primary .icon { border-color: rgba(122,184,106,0.38); background: rgba(122,184,106,0.1); }
    .icon svg { width: 20px; height: 20px; }
    .card-body { flex: 1; min-width: 0; }
    .eyebrow { font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--green-bright); margin-bottom: 3px; font-weight: 400; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; line-height: 1.2; color: var(--white); }
    .card-primary .card-title { font-size: 25px; font-weight: 600; }
    .card-hint { font-size: 11.5px; color: var(--white-dim); margin-top: 2px; }
    .arrow { color: var(--green-bright); opacity: 0.55; flex-shrink: 0; transition: opacity 0.22s, transform 0.22s; }
    .card:hover .arrow { opacity: 1; transform: translateX(3px); }
    .card-map { flex-direction: column; gap: 0; padding: 0; cursor: default; }
    .card-map:hover { transform: none; }
    .map-top { display: flex; align-items: center; gap: 16px; padding: 20px 20px 14px; width: 100%; }

    /* MODIF 2 : vraie carte avec effet néon — remplace .map-frame */
    .map-img-wrap {
      position: relative; width: 100%; overflow: hidden; background: #ede8d8;
    }
    .map-real {
      width: 100%; height: 215px;
      object-fit: cover; 
      display: block;
      filter: none;
      transition: filter 0.3s;
    }
    .card-map:hover { cursor: pointer; }
    .card-map:hover .map-real {
      filter: brightness(1.05);
    }
    .map-neon {
      position: absolute; inset: 0; pointer-events: none;
background: linear-gradient(to bottom, transparent 60%, rgba(6,10,7,0.4) 100%);
    }
    
    
    @keyframes pinPulse {
      0%   { box-shadow: 0 0 0 0   rgba(122,184,106,.9), 0 0 10px rgba(122,184,106,.9); }
      70%  { box-shadow: 0 0 0 16px rgba(122,184,106,0), 0 0 10px rgba(122,184,106,.9); }
      100% { box-shadow: 0 0 0 0   rgba(122,184,106,0), 0 0 10px rgba(122,184,106,.9); }
    }
    

    .map-bottom { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 18px; width: 100%; }
    .map-addr { font-size: 12px; color: var(--white-dim); line-height: 1.5; display: flex; align-items: center; }
    .map-btn { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-bright); border: 1px solid rgba(122,184,106,0.3); padding: 7px 13px; border-radius: 3px; text-decoration: none; white-space: nowrap; flex-shrink: 0; margin-left: 14px; transition: all 0.2s; }
    .map-btn:hover { border-color: var(--green-bright); background: rgba(122,184,106,0.09); }
    .card-map { flex-direction: column; gap: 0; padding: 0; }
    .card-map .map-bottom { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 16px; width: 100%; }
    .cards .card:nth-child(4) { animation: fadeUp 0.5s 0.56s ease both; }
    .footer { margin-top: 28px; margin-bottom: 0; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #ffffff; opacity: 1; text-align: center; }
    @keyframes leafSwayBL {
      0%   { transform: rotate(5deg) scale(1); }
      30%  { transform: rotate(9deg) scale(1.03) translateX(6px); }
      60%  { transform: rotate(3deg) scale(0.98) translateY(-4px); }
      100% { transform: rotate(5deg) scale(1); }
    }
    @keyframes leafSwayTR {
      0%   { transform: rotate(185deg) scale(1); }
      40%  { transform: rotate(180deg) scale(1.04) translateX(-5px); }
      70%  { transform: rotate(188deg) scale(0.97) translateY(5px); }
      100% { transform: rotate(185deg) scale(1); }
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .cards .card:nth-child(1) { animation: fadeUp 0.5s 0.18s ease both; }
    .cards .card:nth-child(2) { animation: fadeUp 0.5s 0.3s  ease both; }
    .cards .card:nth-child(3) { animation: fadeUp 0.5s 0.43s ease both; }
  </style>
</head>
